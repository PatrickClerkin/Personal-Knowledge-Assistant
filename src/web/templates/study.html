<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PKA — Study Mode</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .container { max-width: 820px; margin: 0 auto; }

    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.2rem; }
    .subtitle { color: #64748b; font-size: 0.88rem; margin-bottom: 2rem; }

    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.65rem 1rem;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #6366f1; }

    button {
      padding: 0.65rem 1.4rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover { background: #818cf8; }
    button:disabled { background: #374151; cursor: not-allowed; }

    #status {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    #status.info  { background: #1e3a5f; color: #93c5fd; display: block; }
    #status.error { background: #450a0a; color: #fca5a5; display: block; }

    /* Path header */
    .path-header {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .path-title { font-size: 1.1rem; font-weight: 600; }
    .path-meta { display: flex; gap: 1rem; }

    .meta-pill {
      font-size: 0.75rem;
      background: #252c3d;
      border: 1px solid #2d3748;
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      color: #94a3b8;
    }

    /* Progress bar */
    .progress-bar {
      height: 3px;
      background: #2d3748;
      border-radius: 2px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Section cards */
    .section-card {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .section-card:hover { border-color: #4b5563; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      cursor: pointer;
      user-select: none;
    }

    .section-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #6366f1;
      color: white;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .section-concept {
      flex: 1;
      font-weight: 600;
      font-size: 0.95rem;
      text-transform: capitalize;
    }

    .section-toggle {
      color: #64748b;
      font-size: 0.8rem;
      transition: transform 0.2s;
    }
    .section-card.open .section-toggle { transform: rotate(180deg); }

    .section-body {
      display: none;
      padding: 0 1.25rem 1.25rem;
      border-top: 1px solid #1a1f2e;
    }
    .section-card.open .section-body { display: block; }

    .section-summary {
      color: #cbd5e1;
      font-size: 0.88rem;
      line-height: 1.7;
      margin-top: 1rem;
      margin-bottom: 1rem;
    }

    .section-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .key-terms-block, .sources-block {
      flex: 1;
      min-width: 200px;
    }

    .block-label {
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .term-pill {
      display: inline-block;
      background: #6366f122;
      color: #818cf8;
      border: 1px solid #6366f133;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-size: 0.75rem;
      margin: 0.1rem;
    }

    .source-ref {
      font-size: 0.78rem;
      color: #94a3b8;
      background: #252c3d;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      display: inline-block;
      margin: 0.1rem;
    }

    /* Chunk previews */
    .previews-label {
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .chunk-preview {
      background: #13151f;
      border-left: 3px solid #6366f144;
      border-radius: 0 6px 6px 0;
      padding: 0.6rem 0.9rem;
      font-size: 0.8rem;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    /* Completion tracker */
    .complete-btn {
      background: #14532d;
      color: #4ade80;
      border: 1px solid #166534;
      border-radius: 6px;
      padding: 0.35rem 0.9rem;
      font-size: 0.78rem;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: background 0.15s;
    }
    .complete-btn:hover { background: #166534; }
    .complete-btn.done { background: #064e3b; color: #34d399; }

    .section-card.completed .section-number {
      background: #14532d;
      color: #4ade80;
    }
    .section-card.completed .section-concept {
      color: #6b7280;
      text-decoration: line-through;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📚 Study Mode</h1>
  <p class="subtitle">Generate a personalised learning path from your documents</p>

  <div class="input-row">
    <input type="text" id="topicInput" placeholder="What do you want to study? e.g. neural networks, logistic regression…"/>
    <button id="generateBtn" onclick="generatePath()">Generate Path</button>
  </div>

  <div id="status"></div>
  <div id="output"></div>
</div>

<script>
  let completedSections = new Set();

  function setStatus(msg, type) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = type;
  }

  function clearStatus() {
    const el = document.getElementById("status");
    el.className = "";
    el.textContent = "";
  }

  async function generatePath() {
    const topic = document.getElementById("topicInput").value.trim();
    if (!topic) return;

    const btn = document.getElementById("generateBtn");
    btn.disabled = true;
    btn.textContent = "Generating…";
    setStatus(`Building study path for "${topic}" — this may take 20–40 seconds…`, "info");
    document.getElementById("output").innerHTML = "";
    completedSections.clear();

    try {
      const res = await fetch("/api/study/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic }),
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        setStatus(`Error: ${data.error || "Unknown error"}`, "error");
        return;
      }

      clearStatus();
      renderPath(data);
    } catch (err) {
      setStatus(`Request failed: ${err.message}`, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Generate Path";
    }
  }

  function renderPath(data) {
    const output = document.getElementById("output");

    // Path header
    output.innerHTML = `
      <div class="path-header">
        <div class="path-title">📖 ${escapeHtml(data.topic)}</div>
        <div class="path-meta">
          <span class="meta-pill">⏱ ~${data.estimated_minutes} min</span>
          <span class="meta-pill">📄 ${data.total_sources} source(s)</span>
          <span class="meta-pill">📝 ${data.sections.length} sections</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div id="sections"></div>`;

    const container = document.getElementById("sections");

    data.sections.forEach(section => {
      const termPills = (section.key_terms || [])
        .map(t => `<span class="term-pill">${escapeHtml(t)}</span>`)
        .join("");

      const sourceRefs = (section.sources || [])
        .map(s => `<span class="source-ref">📄 ${escapeHtml(s)}</span>`)
        .join("");

      const previews = (section.chunk_previews || []).slice(0, 2)
        .map(p => `<div class="chunk-preview">${escapeHtml(p)}</div>`)
        .join("");

      const card = document.createElement("div");
      card.className = "section-card";
      card.dataset.order = section.order;
      card.innerHTML = `
        <div class="section-header" onclick="toggleSection(this)">
          <div class="section-number">${section.order}</div>
          <div class="section-concept">${escapeHtml(section.concept)}</div>
          <span class="section-toggle">▼</span>
        </div>
        <div class="section-body">
          <p class="section-summary">${escapeHtml(section.summary)}</p>
          <div class="section-row">
            <div class="key-terms-block">
              <div class="block-label">Key Terms</div>
              ${termPills || '<span style="color:#4b5563;font-size:0.8rem">None extracted</span>'}
            </div>
            <div class="sources-block">
              <div class="block-label">Sources</div>
              ${sourceRefs || '<span style="color:#4b5563;font-size:0.8rem">No sources</span>'}
            </div>
          </div>
          ${previews ? `<div class="previews-label">Excerpts from your documents</div>${previews}` : ""}
          <button class="complete-btn" onclick="markComplete(${section.order}, this)">
            ✓ Mark as studied
          </button>
        </div>`;

      container.appendChild(card);
    });

    // Auto-open first section
    const first = container.querySelector(".section-card");
    if (first) first.classList.add("open");
  }

  function toggleSection(header) {
    const card = header.closest(".section-card");
    card.classList.toggle("open");
  }

  function markComplete(order, btn) {
    const card = document.querySelector(`.section-card[data-order="${order}"]`);
    if (completedSections.has(order)) {
      completedSections.delete(order);
      card.classList.remove("completed");
      btn.textContent = "✓ Mark as studied";
      btn.classList.remove("done");
    } else {
      completedSections.add(order);
      card.classList.add("completed");
      btn.textContent = "✓ Studied";
      btn.classList.add("done");
    }
    updateProgress();
  }

  function updateProgress() {
    const total = document.querySelectorAll(".section-card").length;
    const done = completedSections.size;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById("progressFill").style.width = pct + "%";
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text || "";
    return div.innerHTML;
  }

  // Allow Enter key to trigger generation
  document.getElementById("topicInput").addEventListener("keypress", e => {
    if (e.key === "Enter") generatePath();
  });
</script>
</body>
</html>
